<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Management Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-gray-100 min-h-screen">
    <div class="max-w-6xl mx-auto p-4">
      <h1 class="text-3xl font-bold text-center mb-6 text-indigo-700">
        User Management Dashboard
      </h1>

      <div
        id="error-banner"
        class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 relative"
      >
        <span id="error-message"></span>
        <button
          onclick="
            document.getElementById('error-banner').classList.add('hidden')
          "
          class="absolute top-2 right-2 text-red-700 font-bold"
        >
          &times;
        </button>
      </div>

      <div class="bg-white rounded-lg shadow overflow-x-auto mb-4">
        <table class="w-full text-left">
          <thead class="bg-indigo-600 text-white">
            <tr>
              <th class="px-4 py-3">ID</th>
              <th class="px-4 py-3">Name</th>
              <th class="px-4 py-3">Email</th>
              <th class="px-4 py-3">Company</th>
              <th class="px-4 py-3">City</th>
              <th class="px-4 py-3 text-center">Actions</th>
            </tr>
          </thead>
          <tbody id="user-table-body">
            <tr>
              <td colspan="6" class="text-center text-gray-400 py-8">
                <div id="loading" class="hidden text-center py-10">
                  <div
                    class="inline-block w-8 h-8 border-4 border-indigo-400 border-t-transparent rounded-full animate-spin"
                  ></div>
                  <p class="mt-2 text-gray-500">Loading users...</p>
                </div>
              </td>
            </tr>
            <tr>
              <td colspan="6" class="text-center text-gray-400 py-8">
                <div id="empty-users">No users loaded yet.</div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/store.js"></script>
    <script src="js/api.js"></script>
    <script src="js/render.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
